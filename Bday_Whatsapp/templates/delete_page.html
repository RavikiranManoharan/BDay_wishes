<div class="details-container">

<h2>Manage Records</h2>

<div style="display:flex; gap:10px; margin-bottom:15px; align-items:center;">

  <button class="danger" onclick="deleteAll()">Delete ALL</button>

  <select class = "btn" id="searchType">
    <option value="name">Name</option>
    <option value="dob">DOB</option>
    <option value="month">Month</option>
  </select>

  <input type="text" id="searchInput" placeholder="Search..." />

  <button class="btn" onclick="searchData()">Search</button>

</div>
  <div class = "details-container"> 
    <table id = "tableBody" style="width:100%; border-collapse: collapse;">
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone Number</th>
            <th>Date of Birth</th>
          </tr>
        </thead>
      </table>
  </div>
      
<script>
async function searchData() {
  try {
    const type = document.getElementById('searchType').value;
    const value = document.getElementById('searchInput').value;

    const res = await fetch(`/search?type=${type}&value=${value}`);

    if (!res.ok) {
      console.log("Server error");
      return;
    }

    const data = await res.json();

    const table = document.getElementById('tableBody');
    table.innerHTML = '';

    if (!data || data.length === 0) {
      table.innerHTML = `<tr><td colspan="4">No results</td></tr>`;
      return;
    }

    data.forEach(item => {
      const row = document.createElement('tr');

      row.innerHTML = `
        <td contenteditable="true">${item.name}</td>
        <td contenteditable="true">${item.phone}</td>
        <td contenteditable="true">${item.dob}</td>
        <td>
          <button class="save" onclick="updateRow(this,'${item.table}',${item.id})">Save</button>
          <button class="delete" onclick="deleteRow('${item.table}',${item.id})">Delete</button>
        </td>
      `;

      table.appendChild(row);
    });

  } catch (err) {
    console.error("Search failed:", err);
  }
}

function deleteAll() {
  if (!confirm("Delete ALL data?")) return;

  fetch('/delete_all', { method: 'POST' })
    .then(res => res.json())
    .then(() => location.reload());
}

function deleteRow(table, id) {
  fetch(`/delete/${table}/${id}`, { method: 'POST' })
    .then(() => location.reload());
}

function updateRow(btn, table, id) {
  const row = btn.parentElement.parentElement;
  const cells = row.querySelectorAll('td');

  const data = {
    name: cells[0].innerText,
    phone: cells[1].innerText,
    dob: cells[2].innerText
  };

  fetch(`/edit/${table}/${id}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => alert("Updated"));
}

</script>
